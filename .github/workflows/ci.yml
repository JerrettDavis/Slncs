name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  DOTNET_NOLOGO: true
  INCLUDE_SYMBOLS: true

jobs:
  pr-checks:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: |
            8.0.x
            9.0.x
            10.0.x
          cache: true
          cache-dependency-path: |
            **/packages.lock.json
            global.json

      - name: Restore
        run: |
          dotnet restore --use-lock-file
          dotnet tool restore || true

      - name: Verify no committed prebuilt tool binaries
        shell: bash
        run: |
          set -euo pipefail
          echo "Checking for tracked binaries under src/Slncs.Sdk/tools/net8.0/any ..."
          # List tracked files matching binary payload patterns
          TRACKED=$(git ls-files 'src/Slncs.Sdk/tools/net8.0/any/*' | grep -E '\.(dll|pdb|json|deps|runtimeconfig)$' || true)
          if [ -n "$TRACKED" ]; then
            echo "::group::Tracked prebuilt files"; echo "$TRACKED"; echo "::endgroup::"
            echo "::error title=Prebuilt binaries detected::Remove committed tool payload artifacts (they will be produced during Pack).";
            exit 1;
          fi
          echo "No committed prebuilt tool binaries detected."

      - name: Build (Release)
        run: dotnet build Slncs.slnx --configuration Release --no-restore /p:ContinuousIntegrationBuild=true

      - name: Test with coverage
        run: |
          dotnet test Slncs.slnx \
            --configuration Release \
            --collect:"XPlat Code Coverage" \
            -- DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Format=cobertura \
            -- DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Include="[Slncs*]*" \
            -- DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Exclude="[*Tests]*"

      - name: Install ReportGenerator
        run: dotnet tool update -g dotnet-reportgenerator-globaltool

      - name: Combine coverage and create reports
        shell: bash
        run: |
          REPORTS=$(find . -type f -path "*/TestResults/*/coverage.cobertura.xml" | tr '\n' ';')
          reportgenerator \
            -reports:"$REPORTS" \
            -targetdir:"coverage-report" \
            -reporttypes:"HtmlInline;Cobertura;TextSummary;lcov;Badges" \
            -assemblyfilters:"+Slncs*;-*Tests*" \
            -filefilters:"-**/*.Tests/*;-**/*Tests*/**"
          echo "COVERAGE_SUMMARY<<EOF" >> $GITHUB_ENV
          cat coverage-report/Summary.txt >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      - name: Upload coverage HTML report
        uses: actions/upload-artifact@v7
        with:
            name: coverage-report
            path: coverage-report

      - name: Add coverage summary to PR
        uses: marocchino/sticky-pull-request-comment@v3.0.4
        with:
          recreate: true
          message: |
            ## Code Coverage
            ```
            ${{ env.COVERAGE_SUMMARY }}
            ```

      - name: Upload coverage to Codecov
        if: github.actor != 'dependabot[bot]'
        uses: codecov/codecov-action@v7
        with:
          files: |
            **/TestResults/*/coverage.cobertura.xml
          flags: unittests
          fail_ci_if_error: true
          verbose: true
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  release:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: |
            8.0.x
            9.0.x
            10.0.x
          cache: true
          cache-dependency-path: |
            **/packages.lock.json
            global.json

      - name: Restore
        run: |
          dotnet restore --use-lock-file
          dotnet tool restore || true

      - name: Verify no committed prebuilt tool binaries
        shell: bash
        run: |
          set -euo pipefail
          echo "Checking for tracked binaries under src/Slncs.Sdk/tools/net8.0/any ..."
          TRACKED=$(git ls-files 'src/Slncs.Sdk/tools/net8.0/any/*' | grep -E '\.(dll|pdb|json|deps|runtimeconfig)$' || true)
          if [ -n "$TRACKED" ]; then
            echo "::group::Tracked prebuilt files"; echo "$TRACKED"; echo "::endgroup::"
            echo "::error title=Prebuilt binaries detected::Remove committed tool payload artifacts (they will be produced during Pack).";
            exit 1;
          fi
          echo "No committed prebuilt tool binaries detected."

      - name: Fetch tags
        run: git fetch --prune --tags

      - name: Install GitVersion
        uses: gittools/actions/gitversion/setup@v4
        with:
          versionSpec: '6.x'

      - name: Run GitVersion
        id: gitversion
        uses: gittools/actions/gitversion/execute@v4

      - name: Set version env vars
        id: version
        run: |
          PACKAGE_VERSION="${{ steps.gitversion.outputs.majorMinorPatch }}"
          if [ -n "${{ steps.gitversion.outputs.preReleaseNumber }}" ]; then
            PACKAGE_VERSION="${PACKAGE_VERSION}-ci.${{ steps.gitversion.outputs.preReleaseNumber }}"
          fi
          echo "PACKAGE_VERSION=$PACKAGE_VERSION" >> $GITHUB_ENV
          echo "package_version=$PACKAGE_VERSION" >> $GITHUB_OUTPUT
          echo "ASSEMBLY_VERSION=${{ steps.gitversion.outputs.assemblySemVer }}" >> $GITHUB_ENV
          echo "FILE_VERSION=${{ steps.gitversion.outputs.assemblySemFileVer }}" >> $GITHUB_ENV

      - name: Build (Release)
        run: >
          dotnet build Slncs.slnx
          --configuration Release
          --no-restore
          /p:ContinuousIntegrationBuild=true
          /p:Version=$PACKAGE_VERSION
          /p:AssemblyVersion=$ASSEMBLY_VERSION
          /p:FileVersion=$FILE_VERSION
          /p:PackageVersion=$PACKAGE_VERSION

      - name: Test (Release)
        run: dotnet test Slncs.slnx --configuration Release --no-build --verbosity normal

      - name: Pack (all packable projects)
        run: >
          dotnet pack Slncs.slnx
          --configuration Release
          --no-build
          --output ./artifacts
          /p:ContinuousIntegrationBuild=true
          /p:IncludeSymbols=${{ env.INCLUDE_SYMBOLS }}
          /p:SymbolPackageFormat=snupkg
          /p:Version=$PACKAGE_VERSION
          /p:AssemblyVersion=$ASSEMBLY_VERSION
          /p:FileVersion=$FILE_VERSION
          /p:PackageVersion=$PACKAGE_VERSION

      - name: Upload packages as artifact
        uses: actions/upload-artifact@v7
        with:
          name: nuget-packages
          path: |
            ./artifacts/*.nupkg
            ./artifacts/*.snupkg

      - name: Create and push git tag
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          if git rev-parse "v${PACKAGE_VERSION}" >/dev/null 2>&1; then
            echo "Tag v${PACKAGE_VERSION} already exists. Skipping tag push."
          else
            git tag "v${PACKAGE_VERSION}"
            git push origin "v${PACKAGE_VERSION}"
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: v${{ steps.version.outputs.package_version }}
          name: Release v${{ steps.version.outputs.package_version }}
          files: |
            ./artifacts/*.nupkg
            ./artifacts/*.snupkg
          generate_release_notes: true

      - name: Push to NuGet.org
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        run: |
          if [ -n "$NUGET_API_KEY" ]; then
            dotnet nuget push ./artifacts/*.nupkg \
              --api-key "$NUGET_API_KEY" \
              --source https://api.nuget.org/v3/index.json \
              --skip-duplicate
          else
            echo "Skipping NuGet.org push: API key not set."
          fi

      - name: Push to GitHub Packages (optional)
        run: |
          dotnet nuget push "./artifacts/*.nupkg" \
            --source "https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json" \
            --api-key "${{ secrets.GITHUB_TOKEN }}" \
            --skip-duplicate || true
          dotnet nuget push "./artifacts/*.snupkg" \
            --source "https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json" \
            --api-key "${{ secrets.GITHUB_TOKEN }}" \
            --skip-duplicate || true
